apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: stack-tectonic
  title: Stack Tectonic
  description: Repo-local Orun composition stack of golden paths, published to ghcr.io/sourceplane/stack-tectonic.

spec:
  type: publish-stack
  lifecycle: production
  system: infrastructure
  owner: platform
  domain: platform
  language: yaml
  tags:
    - orun
    - composition
    - golden-path
    - stack
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/stack-tectonic
      icon: github
  docs:
    overview: overview.md
    pages:
      - { path: runbook.md, role: runbook }
  subscribe:
    environments:
      - name: dev
        profile: dry-run
      - name: staging
        profile: release
      - name: production
        profile: release
  parameters:
    registry: ghcr.io/sourceplane/stack-tectonic
    root: .
    version: "1.0.0"
  labels:
    layer: platform
    provider: orun

# Test trigger for GHCR auth fix
