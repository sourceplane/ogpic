apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: events-worker
  description: Cloudflare Worker for the Events and Audit runtime
  title: Events Worker
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  system: messaging
  owner: platform
  domain: platform
  path: apps/events-worker
  dependsOn:
    - component: membership-worker
    - component: policy-worker
  language: typescript
  tags:
    - worker
    - runtime
    - events
    - audit
    - cloudflare
    - orun
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/apps/events-worker
      icon: github
  docs:
    overview: overview.md
    pages:
      - { path: runbook.md, role: runbook }
  providesApis:
    - events-api
  consumesApis:
    - membership-api
    - policy-api
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # BF6b: deploy-time wiring — wrangler.jsonc is rendered, never committed.
    # Verify lanes render from wiring.fixture.json (offline); deploy lanes
    # resolve real IDs from the Secrets Manager wiring manifest (BF5).
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: ogpic

    turboFilter: "@saas/events-worker"
    wranglerConfig: wrangler.jsonc
    wranglerTemplate: wrangler.template.jsonc
    wiringComponents: "cloudflare-hyperdrive"
    wiringEnvs: "stage,prod"
    wiringFixture: wiring.fixture.json
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/events-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/events-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: events
    runtime: cloudflare
# ci: ogpic batch 3 cycle-break pass 1 — events-worker (2026-07-02)
