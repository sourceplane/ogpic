apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: policy-worker
  description: Cloudflare Worker for policy authorization decisions
  title: Policy Worker
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  system: identity
  owner: platform
  domain: identity
  path: apps/policy-worker
  language: typescript
  tags:
    - worker
    - runtime
    - authz
    - rbac
    - cloudflare
    - orun
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/apps/policy-worker
      icon: github
  docs:
    overview: overview.md
    pages:
      - { path: runbook.md, role: runbook }
  providesApis:
    - policy-api
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # BF6: identity/role inputs for the deploy lane's wire-credentials step.
    # Inert until this worker gets a wrangler template (fleet rollout, BF6b).
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: ogpic

    turboFilter: "@saas/policy-worker"
    wranglerConfig: wrangler.jsonc
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/policy-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/policy-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: policy
    runtime: cloudflare
# ci: ogpic bring-up batch 2 — policy-worker leaf deploy (2026-07-02)
# ci: redeploy for the matchmaker RBAC actions (organization.roster/draft/fixture.*).
#     policy-worker bundles @saas/policy-engine; a change to the engine package
#     does NOT select this worker in orun's changed-only plan, so the new actions
#     stayed dark on stage/prod and every roster/fixture request denied as 404.
#     Touch this file alongside a policy-engine action change to redeploy. (2026-07-11)
