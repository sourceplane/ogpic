apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: orun-secrets-tests
  title: Orun Secrets Tests
  description: OS0 first-task smoke suite for the saas-orun-secrets migration — proves the orun-secrets write+consume contract cloud-free.
spec:
  type: turbo-package
  lifecycle: production
  system: quality
  owner: platform
  docs:
    overview: overview.md
  domain: platform
  language: typescript
  tags:
    - test
    - typescript
    - orun-secrets
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/tests/orun-secrets
      icon: github
  subscribe:
    # Runtime resolution history: it failed in CI because the runner addressed
    # the run by its raw exec id instead of the contract run ULID — fixed in
    # orun#524 (remoteSecretResolver maps exec id → RunULID, mirroring
    # wireRunID) and released in v2.33.0, which ci.yml now pins.
    #
    # secretEnv injects the resolved value at runtime (orun run) under the named
    # env var — references only, never values; the runner redacts injected
    # values from all log sinks. OGPIC_ORUN_SMOKE is env-scoped (a distinct
    # value per env); TEST_SUPABASE_API and TEST_CLOUDFLARE_API are PROJECT-
    # scoped brokered bindings (supabase/management-access and
    # cloudflare/workers-deploy) — the chain walk serves them at every env, and
    # each resolve mints a fresh short-lived provider credential.
    # Ref spelling: the workspace segment uses the DECLARED workspace ref
    # (execution.state.workspace: ws_8D3ZJQM2) — immutable and guaranteed to
    # name the run's own workspace. The diagnostic matrix proved the platform
    # workspace's SLUG is not "sourceplane" (a slug-spelled ref fails segment
    # verification with 422), while ws_ + project slug "ogpic" verifies clean.
    environments:
      - name: dev
        profile: verify
        secretEnv:
          OGPIC_ORUN_SMOKE: secret://ws_8D3ZJQM2/ogpic/dev/OGPIC_ORUN_SMOKE
          TEST_SUPABASE_API: secret://ws_8D3ZJQM2/ogpic/dev/TEST_SUPABASE_API
          TEST_CLOUDFLARE_API: secret://ws_8D3ZJQM2/ogpic/dev/TEST_CLOUDFLARE_API
      - name: stage
        profile: verify
        secretEnv:
          OGPIC_ORUN_SMOKE: secret://ws_8D3ZJQM2/ogpic/stage/OGPIC_ORUN_SMOKE
          TEST_SUPABASE_API: secret://ws_8D3ZJQM2/ogpic/stage/TEST_SUPABASE_API
          TEST_CLOUDFLARE_API: secret://ws_8D3ZJQM2/ogpic/stage/TEST_CLOUDFLARE_API
      - name: prod
        profile: verify
        secretEnv:
          OGPIC_ORUN_SMOKE: secret://ws_8D3ZJQM2/ogpic/prod/OGPIC_ORUN_SMOKE
          TEST_SUPABASE_API: secret://ws_8D3ZJQM2/ogpic/prod/TEST_SUPABASE_API
          TEST_CLOUDFLARE_API: secret://ws_8D3ZJQM2/ogpic/prod/TEST_CLOUDFLARE_API
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    # NOTE: the turbo-package verify job template skips preBuildCommand (its
    # guard reads .preBuildCommand, but the value is at .parameters.*), so the
    # jest suite is run from the `build` script instead (tsc --noEmit && jest).
    # That is the step that actually executes in CI and prints the smoke value.
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    preBuildCommand: pnpm exec turbo run test --filter=./
  labels:
    team: platform
    layer: test
