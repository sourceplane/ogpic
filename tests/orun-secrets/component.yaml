apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: orun-secrets-tests
  title: Orun Secrets Tests
  description: OS0 first-task smoke suite for the saas-orun-secrets migration — proves the orun-secrets write+consume contract cloud-free.
spec:
  type: turbo-package
  lifecycle: production
  system: quality
  owner: platform
  docs:
    overview: overview.md
  domain: platform
  language: typescript
  tags:
    - test
    - typescript
    - orun-secrets
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/tests/orun-secrets
      icon: github
  subscribe:
    # NOTE: orun's run-scoped secret resolve endpoint
    # (/state/runs/{runId}/secrets/resolve) is not yet deployed on the backend —
    # declaring component `secretEnv` here makes the run fail closed with
    # "Route not found". Until that ships, this suite proves the Supabase secret
    # at runtime using SUPABASE_ACCESS_TOKEN, which the CI `run` job already
    # carries in its environment (ci.yml, for the Terraform provider). The
    # inspector fingerprints it and runs a live connection test — never the raw
    # value. Re-add per-env `secretEnv` once the resolve endpoint is live.
    environments:
      # DIAGNOSTIC (dev only): re-enable secretEnv for the known static secret to
      # capture the EXACT runtime-resolve outcome + requestId now that
      # config-worker's internal resolve is deployed. stage/prod stay cloud-free.
      - name: dev
        profile: verify
        secretEnv:
          OGPIC_ORUN_SMOKE: secret://sourceplane/ogpic/dev/OGPIC_ORUN_SMOKE
      - name: stage
        profile: verify
      - name: prod
        profile: verify
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    # NOTE: the turbo-package verify job template skips preBuildCommand (its
    # guard reads .preBuildCommand, but the value is at .parameters.*), so the
    # jest suite is run from the `build` script instead (tsc --noEmit && jest).
    # That is the step that actually executes in CI and prints the smoke value.
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    preBuildCommand: pnpm exec turbo run test --filter=./
  labels:
    team: platform
    layer: test
