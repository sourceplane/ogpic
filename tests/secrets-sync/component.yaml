apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: secrets-sync-tests
  title: Secrets Sync Tests
  description: Test suite for the secrets-sync flow.
spec:
  type: turbo-package
  lifecycle: production
  owner: platform
  domain: starter-tests
  language: typescript
  tags:
    - test
    - typescript
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/tests/secrets-sync
      icon: github
  subscribe:
    environments:
      - name: dev
        profile: quick-check
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    preBuildCommand: pnpm exec turbo run test --filter=./
  labels:
    team: platform
    layer: test
