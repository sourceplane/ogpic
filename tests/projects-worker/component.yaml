apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: projects-worker-tests
  title: Projects Worker Tests
  description: Test suite for the projects-worker.
spec:
  type: turbo-package
  lifecycle: production
  system: quality
  owner: platform
  docs:
    overview: overview.md
    pages:
      - { path: ../../docs/testing/triage-runbook.md, role: runbook }
  domain: platform
  path: tests/projects-worker
  language: typescript
  tags:
    - test
    - typescript
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/tests/projects-worker
      icon: github
  subscribe:
    environments:
      - name: dev
        profile: quick-check
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    preBuildCommand: pnpm exec turbo run test --filter=./
  labels:
    team: platform
    layer: test
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
