apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: web-console-next-tests
  title: Web Console Next Tests
  description: Test suite for the web-console-next app.
spec:
  type: turbo-package
  lifecycle: production
  owner: platform
  domain: starter-tests
  language: typescript
  tags:
    - test
    - typescript
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/tests/web-console-next
      icon: github
  subscribe:
    environments:
      - name: dev
        profile: quick-check
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    preBuildCommand: pnpm exec turbo run test --filter=./
  labels:
    team: platform
    layer: test
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
