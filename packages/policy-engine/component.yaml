apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: policy-engine
  title: Policy Engine
  description: RBAC evaluation logic for the Ogpic platform.
spec:
  type: turbo-package
  lifecycle: production
  system: platform-libraries
  owner: platform
  domain: identity
  language: typescript
  tags:
    - library
    - package
    - rbac
    - authz
    - typescript
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/packages/policy-engine
      icon: github
  docs:
    overview: overview.md
    pages:
      - { path: runbook.md, role: runbook }
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: stage
        profile: quick-check
      - name: prod
        profile: quick-check
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
  labels:
    team: platform
    layer: shared
    surface: policy
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
