apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: db
  title: Database Migration Harness
  description: Database migration harness, manifest, and runner for the Ogpic platform.
spec:
  type: turbo-package
  lifecycle: production
  owner: platform
  domain: starter-data
  language: typescript
  tags:
    - library
    - package
    - database
    - typescript
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/packages/db
      icon: github
  docs:
    overview: overview.md
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: stage
        profile: quick-check
      - name: prod
        profile: quick-check
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
  labels:
    team: platform
    layer: shared
    surface: data
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
