apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: cli
  title: CLI
  description: First-class TypeScript CLI for the Ogpic control plane API
spec:
  type: turbo-package
  lifecycle: production
  system: platform-libraries
  owner: platform
  domain: platform
  language: typescript
  tags:
    - library
    - package
    - cli
    - typescript
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/packages/cli
      icon: github
    - title: README
      url: https://github.com/sourceplane/ogpic/blob/main/packages/cli/README.md
      icon: book
  docs:
    overview: overview.md
    pages:
      - { path: runbook.md, role: runbook }
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: stage
        profile: quick-check
      - name: prod
        profile: quick-check
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    preBuildCommand: pnpm exec turbo run test --filter=./
  labels:
    team: platform
    layer: shared
    surface: cli
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
