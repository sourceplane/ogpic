apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: contracts
  title: Contracts
  description: Shared TypeScript API, tenancy, event, and error types with validators for the Ogpic platform.
spec:
  type: turbo-package
  lifecycle: production
  owner: platform
  domain: starter-contracts
  language: typescript
  tags:
    - library
    - package
    - contracts
    - typescript
    - orun
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/packages/contracts
      icon: github
  docs:
    overview: overview.md
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: stage
        profile: quick-check
      - name: prod
        profile: quick-check
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
  labels:
    team: platform
    layer: shared
    surface: contracts
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
