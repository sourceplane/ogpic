apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: sdk
  title: SDK
  description: Runtime-agnostic TypeScript SDK for the Ogpic control plane API
spec:
  type: turbo-package
  lifecycle: production
  owner: platform
  domain: starter-sdk
  language: typescript
  tags:
    - library
    - package
    - sdk
    - typescript
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/packages/sdk
      icon: github
    - title: README
      url: https://github.com/sourceplane/ogpic/blob/main/packages/sdk/README.md
      icon: book
  docs:
    overview: overview.md
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: stage
        profile: quick-check
      - name: prod
        profile: quick-check
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    preBuildCommand: pnpm exec turbo run test --filter=./
  labels:
    team: platform
    layer: shared
    surface: sdk
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
