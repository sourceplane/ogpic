apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: notifications-client
  title: Notifications Client
  description: Client library for the Ogpic notifications service.
spec:
  type: turbo-package
  lifecycle: production
  owner: platform
  domain: starter-shared
  language: typescript
  tags:
    - library
    - package
    - notifications
    - typescript
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/packages/notifications-client
      icon: github
  docs:
    overview: overview.md
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: stage
        profile: quick-check
      - name: prod
        profile: quick-check
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
  labels:
    team: platform
    layer: shared
    surface: shared
