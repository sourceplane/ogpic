apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: cloudflare-hyperdrive
  title: Cloudflare Hyperdrive
  description: Provisions Cloudflare Hyperdrive resources for stage and prod Supabase Postgres databases
  labels:
    domain: infra
    scope: runtime-database-gateway

spec:
  type: terraform
  lifecycle: production
  owner: platform
  domain: infra

  # Hyperdrive's origin is the Supabase Postgres connection that `supabase`
  # writes to AWS Secrets Manager; it must run after that secret exists.
  dependsOn:
    - component: supabase

  parameters:
    orgName: sourceplane
    stackName: cloudflare-hyperdrive
    terraformDir: terraform
    terraformVersion: "1.15.3"

  env:
    AWS_EC2_METADATA_DISABLED: "true"


  language: hcl
  tags:
    - infrastructure
    - terraform
    - cloudflare
    - hyperdrive
    - postgres
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/infra/terraform/cloudflare-hyperdrive
      icon: github
    - title: README
      url: https://github.com/sourceplane/ogpic/blob/main/infra/terraform/cloudflare-hyperdrive/README.md
      icon: book
  docs:
    overview: overview.md

  subscribe:
    environments:
      - name: stage
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

      - name: prod
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
