apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: supabase
  title: Supabase Projects
  description: Provisions Supabase projects for stage and prod and stores credentials in AWS Secrets Manager
  labels:
    domain: infra
    scope: database

spec:
  type: terraform
  lifecycle: production
  system: infrastructure
  owner: platform
  domain: platform

  # Supabase provisioning writes credentials to AWS Secrets Manager and stores
  # Terraform state in S3; both are proven by `bootstrap` first.
  dependsOn:
    - component: bootstrap

  parameters:
    orgName: sourceplane
    stackName: supabase
    terraformDir: terraform
    terraformVersion: "1.15.3"
    # Supabase region is surfaced to Terraform as TF_VAR_supabaseRegion by the
    # terraform composition's parameter→TF_VAR loop. The org id is NOT committed
    # here: it is account-specific and injected as TF_VAR_supabaseOrgId from the
    # SUPABASE_ORG_ID CI secret (see .github/workflows/ci.yml). Keeping it out of
    # parameters also prevents the param→TF_VAR loop from overriding the secret.
    supabaseRegion: ap-southeast-1

  env:
    AWS_EC2_METADATA_DISABLED: "true"

  language: hcl
  tags:
    - infrastructure
    - terraform
    - supabase
    - database
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/infra/terraform/supabase
      icon: github
    - title: README
      url: https://github.com/sourceplane/ogpic/blob/main/infra/terraform/supabase/README.md
      icon: book
  docs:
    overview: overview.md
    pages:
      - { path: runbook.md, role: runbook }

  subscribe:
    environments:
      - name: stage
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

      - name: prod
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
