apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: cloudflare-kv
  title: Cloudflare KV
  description: Provisions Cloudflare KV namespaces backing the api-edge idempotency replay store (stage and prod)
  labels:
    domain: infra
    scope: edge-idempotency-replay-store

spec:
  type: terraform
  lifecycle: production
  system: infrastructure
  owner: platform
  domain: platform

  parameters:
    orgName: sourceplane
    stackName: cloudflare-kv
    terraformDir: terraform
    terraformVersion: "1.15.3"

  env:
    AWS_EC2_METADATA_DISABLED: "true"


  language: hcl
  tags:
    - infrastructure
    - terraform
    - cloudflare
    - kv
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic/tree/main/infra/terraform/cloudflare-kv
      icon: github
    - title: README
      url: https://github.com/sourceplane/ogpic/blob/main/infra/terraform/cloudflare-kv/README.md
      icon: book
  docs:
    overview: overview.md
    pages:
      - { path: runbook.md, role: runbook }

  subscribe:
    environments:
      - name: stage
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

      - name: prod
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
