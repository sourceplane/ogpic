apiVersion: sourceplane.io/v1
kind: Intent

metadata:
  name: lumen
  description: Reusable Cloudflare and Supabase multi-tenant SaaS starter
  namespace: sourceplane

execution:
  state:
    backendUrl: https://api-edge-prod.oruncloud.workers.dev
    # Declared, enforced tenancy: the workspace claim is sent on every remote op
    # (including the credential-free CI OIDC exchange) so orun-cloud can enforce
    # claim ⊆ authorized. Declaring it implies strict mode — a non-interactive
    # run that resolves no workspace fails fast (specs/oidc-ci-tenancy §4.1).
    # `workspace` is the leading spelling in orun v2.20.0 (a ws_ Workspace ID,
    # slug, or legacy org_ id); it supersedes the deprecated `org:` alias.
    workspace: ws_4975BJ7P
    requireOrg: true
    # Push/sync the resolved catalog to orun-cloud after a successful plan on the
    # default branch, keeping the org-global catalog head fresh without an
    # explicit `--push-catalog`.
    autopushCatalog: true

compositions:
  sources:
    - name: stack-tectonic
      kind: dir
      path: stack-tectonic
  resolution:
    precedence:
      - stack-tectonic
    bindings:
      terraform: stack-tectonic
      cloudflare-domain: stack-tectonic
      db-migrate: stack-tectonic

discovery:
  roots:
    - apps/
    - infra/
    - packages/
    - tests/

automation:
  triggerBindings:
    github-pull-request:
      description: Pull request validation
      on:
        provider: github
        event: pull_request
        actions:
          - opened
          - synchronize
          - reopened
          - ready_for_review
        baseBranches:
          - main
      plan:
        scope: changed
        base: pull_request.base.sha
        head: pull_request.head.sha

    github-push-main:
      description: Main branch stack convergence after merge
      on:
        provider: github
        event: push
        branches:
          - main

    local-development:
      description: Local testing with full Terraform execution
      on:
        provider: local

environments:
  dev:
    activation:
      triggerRefs:
        - github-pull-request
        - github-push-main
        - local-development
    parameterDefaults:
      terraform:
        awsRegion: us-east-1
        awsAccountId: "306024784101"
        lane: verify
        namespace: sourceplane
        namespacePrefix: dev-
        owner: sourceplane
        repo: lumen
        CONSOLE_CUSTOM_DOMAIN: ""
    policies:
      requireApproval: "false"
    env:
      AWS_REGION: us-east-1
      BASE_DOMAIN: lumen.app

  stage:
    activation:
      triggerRefs:
        - github-pull-request
        - github-push-main
    parameterDefaults:
      terraform:
        awsRegion: us-east-1
        awsAccountId: "306024784101"
        lane: verify
        namespace: sourceplane
        namespacePrefix: stg-
        owner: sourceplane
        repo: lumen
        CONSOLE_CUSTOM_DOMAIN: stage.lumen.app
    policies:
      requireApproval: "false"
    env:
      AWS_REGION: us-east-1
      BASE_DOMAIN: lumen.app

  prod:
    activation:
      triggerRefs:
        - github-pull-request
        - github-push-main
    promotion:
      dependsOn:
        - environment: stage
    parameterDefaults:
      terraform:
        awsRegion: us-east-1
        awsAccountId: "306024784101"
        lane: verify
        namespace: sourceplane
        namespacePrefix: prod-
        owner: sourceplane
        repo: lumen
        CONSOLE_CUSTOM_DOMAIN: prod.lumen.app
    policies:
      requireApproval: "false"
    env:
      AWS_REGION: us-east-1
      BASE_DOMAIN: lumen.app
