apiVersion: sourceplane.io/v1
kind: Intent

metadata:
  name: ogpic
  description: Ogpic — photography equipment rental marketplace on Cloudflare and Supabase
  namespace: sourceplane

# Repo/workspace self-description (orun v2.21.0, saas-workspace-overview WO3).
# Resolves to a single `Repo` entity in the service catalog. Unlike component
# docs (path pointers), the repo `docs.overview` markdown is read at plan time
# and walked into the catalog closure as a content-addressed blob, so orun-cloud
# renders it as the workspace front page without reaching back into git.
repo:
  displayName: Ogpic
  description: >-
    Photography-equipment rental marketplace on a reusable Cloudflare + Supabase
    multi-tenant SaaS platform, delivered as an Orun component-native
    desired-state repo.
  owner: platform
  docs:
    overview: docs/overview.md
    # The repo doc set (saas-catalog-docs, orun >= v2.23.0): read at the pinned
    # commit, carried as content-addressed blobs, browsable in the cloud's Docs
    # hub. Older orun versions ignore `pages` (lenient intent parse).
    pages:
      - { path: docs/architecture.md, role: architecture }
      - { path: docs/runbook.md, role: runbook }
      - { path: FORKING.md, role: onboarding, title: Forking guide }
  links:
    - title: Source
      url: https://github.com/sourceplane/ogpic
      icon: github
    - title: README
      url: https://github.com/sourceplane/ogpic/blob/main/README.md
      icon: book
    - title: Forking guide
      url: https://github.com/sourceplane/ogpic/blob/main/FORKING.md
      icon: book
  tags:
    - saas
    - marketplace
    - cloudflare
    - supabase
    - multi-tenant
    - orun

# Service-catalog resolution. `namespace` keys every catalog entity
# (<namespace>/<repo>/<name>); align it with the repo's namespace identity
# (metadata.namespace + the terraform namespace parameterDefaults) rather than
# the implicit "default".
catalog:
  namespace: sourceplane
  # Enrichment for the derived kinds (saas-catalog-docs CD2, orun >= v2.23.0):
  # metadata + docs merged onto the Systems/Domains the components imply.
  # Enrich-never-create: nothing appears unless a component references it.
  entities:
    domain/engagement:
      description: "Email, Slack, and signed webhooks — reaching people and systems, fire-and-forget."
      owner: platform
      docs: { overview: docs/domains/engagement.md }
    domain/identity:
      description: "Authentication and deny-by-default authorization: who you are and what you may do."
      owner: platform
      docs: { overview: docs/domains/identity.md }
    domain/platform:
      description: "The horizontal foundation: edge, events, config, admin, integrations, libraries, infra, quality."
      owner: platform
      docs: { overview: docs/domains/platform.md }
    domain/revenue:
      description: "Plans, subscriptions, invoices (Polar), and the usage metering behind entitlements."
      owner: platform
      docs: { overview: docs/domains/revenue.md }
    domain/storefront:
      description: "The customer-facing marketplace experience rendered by the web console."
      owner: platform
      docs: { overview: docs/domains/storefront.md }
    domain/tenancy:
      description: "Organizations, members, teams, and the project/environment grain everything scopes to."
      owner: platform
      docs: { overview: docs/domains/tenancy.md }
    system/billing:
      description: "Subscriptions, invoices, and usage metering around the Polar provider."
      owner: platform
      docs: { overview: docs/systems/billing.md }
    system/console:
      description: "The Next.js product surface on Workers — a thin client of the public API."
      owner: platform
      docs: { overview: docs/systems/console.md }
    system/edge:
      description: "The single public entry point: tenancy resolution, rate limits, per-context facades."
      owner: platform
      docs: { overview: docs/systems/edge.md }
    system/identity:
      description: "Session/key verification and fail-closed policy evaluation."
      owner: platform
      docs: { overview: docs/systems/identity.md }
    system/infrastructure:
      description: "Postgres, Hyperdrive, KV, domains, migrations, and the golden-path stack."
      owner: platform
      docs: { overview: docs/systems/infrastructure.md }
    system/messaging:
      description: "The append-only event log, notification delivery, and outgoing webhooks."
      owner: platform
      docs: { overview: docs/systems/messaging.md }
    system/operations:
      description: "Config/flags/secrets, admin support tooling, and provider integrations."
      owner: platform
      docs: { overview: docs/systems/operations.md }
    system/platform-libraries:
      description: "The shared workspace packages — merging is releasing."
      owner: platform
      docs: { overview: docs/systems/platform-libraries.md }
    system/quality:
      description: "Per-component verification suites, deterministic and cloud-free."
      owner: platform
      docs: { overview: docs/systems/quality.md }
    system/tenancy:
      description: "Workspace, membership, team, and project/environment services."
      owner: platform
      docs: { overview: docs/systems/tenancy.md }

execution:
  state:
    backendUrl: https://api-edge-prod.oruncloud.workers.dev
    # Declared, enforced tenancy: the workspace claim is sent on every remote op
    # (including the credential-free CI OIDC exchange) so orun-cloud can enforce
    # claim ⊆ authorized. Declaring it implies strict mode — a non-interactive
    # run that resolves no workspace fails fast (specs/oidc-ci-tenancy §4.1).
    # `workspace` is the leading spelling in orun v2.20.0 (a ws_ Workspace ID,
    # slug, or legacy org_ id); it supersedes the deprecated `org:` alias.
    workspace: ws_8D3ZJQM2
    requireOrg: true
    # Push/sync the resolved catalog to orun-cloud after a successful plan on the
    # default branch, keeping the org-global catalog head fresh without an
    # explicit `--push-catalog`.
    autopushCatalog: true

compositions:
  sources:
    - name: stack-tectonic
      kind: dir
      path: stack-tectonic
  resolution:
    precedence:
      - stack-tectonic
    bindings:
      terraform: stack-tectonic
      cloudflare-domain: stack-tectonic
      db-migrate: stack-tectonic

discovery:
  roots:
    - apps/
    - infra/
    - packages/
    - tests/

automation:
  triggerBindings:
    github-pull-request:
      description: "Pull request validation"
      on:
        provider: github
        event: pull_request
        actions:
          - opened
          - synchronize
          - reopened
          - ready_for_review
        baseBranches:
          - main
      plan:
        scope: changed
        base: pull_request.base.sha
        head: pull_request.head.sha

    github-push-main:
      description: "Main branch stack convergence after merge"
      on:
        provider: github
        event: push
        branches:
          - main

    local-development:
      description: "Local testing with full Terraform execution"
      on:
        provider: local

environments:
  dev:
    activation:
      triggerRefs:
        - github-pull-request
        - github-push-main
        - local-development
    parameterDefaults:
      terraform:
        awsRegion: us-east-1
        awsAccountId: "306024784101"
        lane: verify
        namespace: sourceplane
        namespacePrefix: dev-
        owner: sourceplane
        repo: ogpic
        CONSOLE_CUSTOM_DOMAIN: ""
    policies:
      requireApproval: "false"
    env:
      AWS_REGION: us-east-1
      BASE_DOMAIN: ogpic.app

  stage:
    activation:
      triggerRefs:
        - github-pull-request
        - github-push-main
    parameterDefaults:
      terraform:
        awsRegion: us-east-1
        awsAccountId: "306024784101"
        lane: verify
        namespace: sourceplane
        namespacePrefix: stg-
        owner: sourceplane
        repo: ogpic
        CONSOLE_CUSTOM_DOMAIN: stage.ogpic.app
    policies:
      requireApproval: "false"
    env:
      AWS_REGION: us-east-1
      BASE_DOMAIN: ogpic.app

  prod:
    activation:
      triggerRefs:
        - github-pull-request
        - github-push-main
    promotion:
      dependsOn:
        - environment: stage
    parameterDefaults:
      terraform:
        awsRegion: us-east-1
        awsAccountId: "306024784101"
        lane: verify
        namespace: sourceplane
        namespacePrefix: prod-
        owner: sourceplane
        repo: ogpic
        CONSOLE_CUSTOM_DOMAIN: prod.ogpic.app
    policies:
      requireApproval: "false"
    env:
      AWS_REGION: us-east-1
      BASE_DOMAIN: ogpic.app
